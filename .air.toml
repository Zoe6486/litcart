# 项目根目录和临时目录
# 使用 . 或绝对路径，请注意 `tmp_dir` 目录必须在 `root` 目录下
root = "."
tmp_dir = "tmp"

[build]
# # 只需要写你平常编译使用的shell命令。你也可以使用 `make`
# cmd = "swag init && go build -o ./tmp/main"
# # 启动构建脚本（建议用脚本封装复杂命令）
# cmd = "./build.sh"
# ===========================================
# 上面两个二选一，下面那个都一样写 bin = "tmp/main"
# ===========================================
# # 由`cmd`命令得到的二进制文件路径
# bin = "tmp/main"
# 运行命令，替代 full_bin，带参数启动程序
run_cmd = "./tmp/main ./conf/dev.yaml"
# 监听的文件扩展名
include_ext = ["go", "tpl", "tmpl", "html", "yaml"]
# 排除目录
exclude_dir = ["assets", "tmp", "vendor", "frontend/node_modules"]
# 监听目录（空则监听 root 及子目录）
include_dir = []
# 排除文件
exclude_file = []
# 触发构建延迟，单位毫秒
delay = 1000
# 构建失败时停止运行旧程序
stop_on_error = true
# air 错误日志文件
log = "air_errors.log"

[log]
# 显示日志时间
time = true

[color]
# 自定义每个部分显示的颜色。如果找不到颜色，使用原始的应用程序日志。
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
